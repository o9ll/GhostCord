name: Build & Release Ghostcord

on:
  push:
    tags:
      - "v*"          # triggered on: git tag v1.0.0 && git push --tags

permissions:
  contents: write    # necessary to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Equicord renderer (standalone)
        run: pnpm buildStandalone

      - name: Download Discord for build
        shell: pwsh
        run: |
          $discordBase = "$env:LOCALAPPDATA\Discord"
          New-Item -ItemType Directory -Path $discordBase -Force | Out-Null

          # Fetch latest Discord version from update API
          $apiUrl = "https://discord.com/api/updates/distributions/app/installers/latest?channel=stable&platform=win32&arch=x64"
          try {
            $info = Invoke-RestMethod -Uri $apiUrl -ErrorAction Stop
            $version = $info.version
            Write-Host "Latest Discord version: $version"
          } catch {
            # Fallback: parse version from redirect URL
            $req = [System.Net.WebRequest]::Create("https://discord.com/api/download?platform=win&format=exe")
            $req.AllowAutoRedirect = $false
            $resp = $req.GetResponse()
            $loc = $resp.GetResponseHeader("Location")
            $resp.Close()
            $version = if ($loc -match '/app/win/([^/]+)/') { $matches[1] } else { throw "Could not determine Discord version" }
            Write-Host "Discord version (fallback): $version"
          }

          $nupkgUrl = "https://dl.discordapp.net/apps/win/$version/Discord-$version-full.nupkg"
          $nupkgPath = "$env:TEMP\discord-$version.nupkg"
          $extractDir = "$env:TEMP\discord-extracted-$version"

          Write-Host "Downloading $nupkgUrl ..."
          Invoke-WebRequest -Uri $nupkgUrl -OutFile $nupkgPath -UserAgent "Ghostcord/CI"

          Remove-Item -Path $extractDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" x $nupkgPath -o"$extractDir" -y | Out-Null

          $appDir = Join-Path $discordBase "app-$version"
          New-Item -ItemType Directory -Path $appDir -Force | Out-Null
          Copy-Item "$extractDir\lib\net45\*" $appDir -Recurse -Force

          # Verify Discord.exe exists
          if (-not (Test-Path "$appDir\Discord.exe")) {
            Write-Host "WARNING: Discord.exe not found at expected path — listing extracted files:"
            Get-ChildItem -Path $extractDir -Recurse -Depth 3 | Select-Object FullName | Format-Table
            throw "Discord.exe not found after extraction"
          }

          Write-Host "Discord $version ready at $appDir"

      - name: Build & Package Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node electron-builder.config.cjs
          npx electron-builder --config electron-builder.config.cjs --win --publish always

      - name: Package ghostcord-dist.zip
        shell: pwsh
        run: |
          # ghostcord-dist.zip — structure attendue par l'installeur (Program.cs EnsureDistAsync) :
          # la racine du zip = _distDir (%LOCALAPPDATA%\Ghostcord\dist\)
          # => patcher.js DOIT être à la racine, pas dans un sous-dossier dist\desktop\
          $staging = "ghostcord-dist-staging"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          # Fichiers JS compilés : on copie le CONTENU de dist\desktop\ à la racine du staging
          # (patcher.js, renderer.js, preload.js, etc. directement accessibles)
          if (Test-Path "dist\desktop") {
            Copy-Item "dist\desktop\*" "$staging\" -Recurse -Force
          } elseif (Test-Path "dist") {
            # Fallback : ancienne structure
            Copy-Item "dist\*" "$staging\" -Recurse -Force
          }

          # Ghost-server (voice/stream server)
          if (Test-Path "ghost-server") {
            Copy-Item "ghost-server" "$staging\ghost-server" -Recurse
          }

          # Static assets from release/ghostcord-dist (ffmpeg.dll, modules, mac/, multi-instance-icons/, etc.)
          if (Test-Path "release\ghostcord-dist") {
            Copy-Item "release\ghostcord-dist\*" "$staging\" -Recurse -Force
          }

          # Entry-point files
          foreach ($f in @("ghostcord-index.js", "ghostcord-preload.js")) {
            if (Test-Path $f) { Copy-Item $f "$staging\" }
          }

          # Sanity-check : patcher.js doit être à la racine
          if (-not (Test-Path "$staging\patcher.js")) {
            Write-Error "BUILD ERROR: patcher.js absent de la racine du staging — l'installeur ne pourra pas fonctionner."
            exit 1
          }

          Compress-Archive -Path "$staging\*" -DestinationPath "ghostcord-dist.zip" -Force
          Write-Host "ghostcord-dist.zip created ($($(Get-Item ghostcord-dist.zip).Length / 1MB) MB)"

      - name: Upload ghostcord-dist.zip to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ghostcord-dist.zip
            dist/desktop.asar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
